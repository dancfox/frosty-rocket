<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a8d8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5bb8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8f0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5bb8e8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e90d4;stop-opacity:0" />
    </linearGradient>
    <filter id="frostGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(20, 10)" filter="url(#frostGlow)">
    <ellipse cx="60" cy="128" rx="10" ry="18" fill="url(#flameGrad)" opacity="0.85"/>
    <ellipse cx="60" cy="132" rx="6" ry="12" fill="#ceeefa" opacity="0.5"/>
    <path d="M46,112 L46,68 Q60,30 74,68 L74,112 Z" fill="url(#rocketGrad)" stroke="#5bb8e8" stroke-width="1.5"/>
    <path d="M46,68 Q60,20 74,68 Z" fill="#a8d8f0" stroke="#5bb8e8" stroke-width="1"/>
    <circle cx="60" cy="78" r="8" fill="#1a6fa8" stroke="#a8d8f0" stroke-width="1.5"/>
    <circle cx="60" cy="78" r="4" fill="#e8f4fd" opacity="0.6"/>
    <path d="M46,112 L34,128 L46,120 Z" fill="#7ec8e8" stroke="#5bb8e8" stroke-width="1"/>
    <path d="M74,112 L86,128 L74,120 Z" fill="#7ec8e8" stroke="#5bb8e8" stroke-width="1"/>
    <g stroke="#a8d8f0" stroke-width="1.2" stroke-linecap="round">
      <line x1="30" y1="48" x2="30" y2="40"/>
      <line x1="26" y1="44" x2="34" y2="44"/>
      <line x1="27.2" y1="41.2" x2="32.8" y2="46.8"/>
      <line x1="32.8" y1="41.2" x2="27.2" y2="46.8"/>
    </g>
    <g stroke="#ceeefa" stroke-width="1" stroke-linecap="round">
      <line x1="88" y1="38" x2="88" y2="32"/>
      <line x1="85" y1="35" x2="91" y2="35"/>
      <line x1="85.8" y1="32.8" x2="90.2" y2="37.2"/>
      <line x1="90.2" y1="32.8" x2="85.8" y2="37.2"/>
    </g>
    <circle cx="42" cy="60" r="2" fill="#ceeefa" opacity="0.8"/>
    <circle cx="82" cy="72" r="1.5" fill="#a8d8f0" opacity="0.7"/>
    <circle cx="36" cy="90" r="1.5" fill="#ceeefa" opacity="0.6"/>
  </g>

  <text x="122" y="82"
    font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="3"
    fill="#1a6fa8">FROSTY</text>

  <text x="124" y="118"
    font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="3"
    fill="#5bb8e8">ROCKET</text>

  <line x1="122" y1="90" x2="378" y2="90" stroke="#a8d8f0" stroke-width="1.2" opacity="0.7"/>

  <text x="124" y="145"
    font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
    font-size="11" font-weight="400" letter-spacing="4"
    fill="#7ec8e8">CONSULTING</text>

</svg>
